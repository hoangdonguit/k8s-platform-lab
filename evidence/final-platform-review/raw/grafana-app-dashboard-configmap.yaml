apiVersion: v1
data:
  gitops-cicd-demo-app.json: |
    {
      "uid": "gitops-cicd-demo-app",
      "title": "GitOps CI/CD Demo App",
      "tags": [
        "k8s-platform-lab",
        "gitops-cicd-demo-app",
        "prometheus"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "App Version",
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "gitops_cicd_demo_app_info{job=\"gitops-cicd-demo-app\",namespace=\"apps\"}",
              "legendFormat": "{{version}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "name",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Scrape Target Up",
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "up{job=\"gitops-cicd-demo-app\",namespace=\"apps\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Ready Replicas",
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"apps\",deployment=\"gitops-cicd-demo-app\"}",
              "legendFormat": "available",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Current App Alerts",
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(ALERTS{app=\"gitops-cicd-demo-app\",alertstate=\"firing\"}) or vector(0)",
              "legendFormat": "firing",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request Rate by Route",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum by (route, method, status) (rate(gitops_cicd_demo_http_requests_total{job=\"gitops-cicd-demo-app\",namespace=\"apps\",route!=\"\"}[5m]))",
              "legendFormat": "{{method}} {{route}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "P95 Latency by Route",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, route, method) (rate(gitops_cicd_demo_http_request_duration_seconds_bucket{job=\"gitops-cicd-demo-app\",namespace=\"apps\",route!=\"\"}[5m])))",
              "legendFormat": "{{method}} {{route}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "5xx Error Ratio",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "((sum(rate(gitops_cicd_demo_http_requests_total{job=\"gitops-cicd-demo-app\",namespace=\"apps\",status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(gitops_cicd_demo_http_requests_total{job=\"gitops-cicd-demo-app\",namespace=\"apps\"}[5m])), 0.001))",
              "legendFormat": "5xx ratio",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 4
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Container CPU Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"apps\",pod=~\"gitops-cicd-demo-app.*\",container=\"app\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Container Memory Working Set",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 21
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"apps\",pod=~\"gitops-cicd-demo-app.*\",container=\"app\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Firing App Alerts",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 21
          },
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(ALERTS{app=\"gitops-cicd-demo-app\",alertstate=\"firing\"}) or vector(0)",
              "legendFormat": "firing alerts",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 1,
              "decimals": 0
            }
          }
        }
      ]
    }
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: p2-grafana-app-dashboards:/ConfigMap:monitoring/gitops-cicd-demo-app-dashboard

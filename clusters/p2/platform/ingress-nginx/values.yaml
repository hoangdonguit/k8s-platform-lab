controller:
  kind: DaemonSet

  ingressClass: nginx
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
    controllerValue: k8s.io/ingress-nginx

  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443
    externalTrafficPolicy: Cluster

  metrics:
    enabled: true

  admissionWebhooks:
    enabled: true

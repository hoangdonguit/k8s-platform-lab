apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p2-ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-platform-lab
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          kind: DaemonSet
          ingressClass: nginx
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
            controllerValue: k8s.io/ingress-nginx
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
            externalTrafficPolicy: Cluster
          metrics:
            enabled: true
          admissionWebhooks:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

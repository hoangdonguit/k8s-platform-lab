apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p2-kyverno
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-platform-lab
spec:
  project: default
  source:
    repoURL: https://github.com/hoangdonguit/k8s-platform-lab.git
    targetRevision: main
    path: clusters/p2/platform/kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec.conversion
        - .spec.versions[].schema
        - .status

    - group: batch
      kind: Job
      namespace: kyverno
      name: kyverno-migrate-resources
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec.selector
        - .spec.template.metadata
        - .status

    - group: kyverno.io
      kind: ClusterPolicy
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec.admission
        - .spec.background
        - .spec.emitWarning
        - .spec.rules[].skipBackgroundRequests
        - .spec.validationFailureActionOverrides
        - .status

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p2-kyverno
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: k8s-platform-lab
spec:
  project: default
  source:
    repoURL: https://github.com/hoangdonguit/k8s-platform-lab.git
    targetRevision: main
    path: clusters/p2/platform/kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Kyverno 1.18 ships several large CRDs under policies.kyverno.io.
    # Kubernetes API server/defaulting may own normalized fields after apply,
    # which can keep ArgoCD in OutOfSync even when the CRDs are functional.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      managedFieldsManagers:
        - kube-apiserver
        - kube-controller-manager

    # Kyverno policies can be defaulted/updated by Kyverno controllers.
    # Keep Git as the source of truth, but ignore controller-managed live fields.
    - group: kyverno.io
      kind: ClusterPolicy
      managedFieldsManagers:
        - kyverno
        - kyverno-admission-controller
        - kyverno-background-controller
        - kyverno-reports-controller
        - kyverno-cleanup-controller

    # The migration Job is completed after install; Kubernetes adds runtime fields.
    - group: batch
      kind: Job
      namespace: kyverno
      name: kyverno-migrate-resources
      jsonPointers:
        - /spec/selector
        - /spec/template/metadata/labels
        - /status

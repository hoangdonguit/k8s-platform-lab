controller:
  kind: DaemonSet

  ingressClass: nginx

  ingressClassResource:
    name: nginx
    enabled: true
    default: true
    controllerValue: k8s.io/ingress-nginx

  service:
    type: LoadBalancer
    annotations:
      metallb.io/loadBalancerIPs: 192.168.0.241

  metrics:
    enabled: true

  admissionWebhooks:
    enabled: true
